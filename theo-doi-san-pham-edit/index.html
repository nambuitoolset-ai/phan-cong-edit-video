<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3;url=https://app.namoinam.com/tiktok">
  <title>Chuyển Hướng Hệ Thống Mới — namoinam.com</title>
  <style>
    :root {
      --blue: #1456F0;
      --blue-hover: #0d45c7;
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --text: #1E293B;
      --text-sub: #64748B;
      --border: #E2E8F0;
      --radius: 16px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      background: var(--card-bg);
      padding: 40px 32px;
      border-radius: var(--radius);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .icon-wrapper {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-color: #EEF2FF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .icon-wrapper svg {
      color: var(--blue);
    }
    h2 {
      color: #0F172A;
      margin: 0 0 12px 0;
      font-size: 22px;
      font-weight: 800;
    }
    p {
      line-height: 1.6;
      color: var(--text-sub);
      margin: 0 0 24px 0;
      font-size: 14.5px;
    }
    .target-box {
      background-color: #F1F5F9;
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      color: #0F172A;
      font-weight: bold;
      word-break: break-all;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 24px;
      background-color: var(--blue);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14.5px;
      transition: all 0.15s ease;
      box-shadow: 0 4px 12px rgba(20, 86, 240, 0.15);
    }
    .btn:hover {
      background-color: var(--blue-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(20, 86, 240, 0.2);
    }
    .loader {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrapper">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
    </div>
    <h2>Hệ Thống Đã Nâng Cấp</h2>
    <p>Trang web này hiện đã được chuyển sang địa chỉ Portal điều hành mới chuyên nghiệp hơn tại:</p>
    <div class="target-box">app.namoinam.com/tiktok</div>
    <p style="font-size: 13px; margin-bottom: 20px;">Hệ thống đang tự động chuyển hướng sau 3 giây...</p>
    <a class="btn" href="https://app.namoinam.com/tiktok">
      <span class="loader"></span> Đang chuyển hướng...
    </a>
  </div>
  <script>
    setTimeout(function() {
      window.location.href = "https://app.namoinam.com/tiktok";
    }, 3000);
  </script>
</body>
</html>
