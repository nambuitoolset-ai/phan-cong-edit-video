<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phân công edit video</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;padding:24px;color:#1a1a1a}
h1{font-size:20px;font-weight:500;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:32px}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:16px 20px}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.av{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0}
.name{font-weight:500;font-size:15px}
.cnt{font-size:13px;color:#666;margin-top:1px}
.list{border-top:0.5px solid rgba(0,0,0,0.1);padding-top:10px;display:flex;flex-direction:column;gap:5px}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.pname{font-size:13px;background:#f5f5f0;border-radius:8px;padding:4px 10px;flex:1}
.pct{font-size:13px;color:#666;white-space:nowrap}
.section{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:20px 24px;margin-bottom:16px}
h2{font-size:16px;font-weight:500;margin-bottom:16px}
.link-table{width:100%;border-collapse:collapse}
.link-table tr{border-bottom:0.5px solid rgba(0,0,0,0.08)}
.link-table tr:last-child{border-bottom:none}
.link-table td{padding:10px 0;font-size:13px}
.link-table td:first-child{color:#1a1a1a;width:55%}
.link-table td:last-child{text-align:right}
.link-table a{color:#0066cc;text-decoration:none;font-size:13px}
.link-table a:hover{text-decoration:underline}
.no-link{color:#aaa;font-size:13px}
</style>
</head>
<body>
<h1>Phân công edit video theo nhân sự</h1>

<div class="grid">
